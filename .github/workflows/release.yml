name: Release

on:
    push:
        tags: ['v*']

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm
            - run: npm ci
            - run: npm run validate:release -- --tag "${GITHUB_REF_NAME}"
            - run: npm run build:zip
            - uses: softprops/action-gh-release@v2
              with:
                  files: dist/mozcheck.zip
                  generate_release_notes: true
